service: day13-observability-lab
window: 28d
slis:
  latency_p95_ms:
    objective: 3000
    target: 99.5
    note: Keep p95 under 3000ms for 99.5% of requests over 28d; baseline is ~150ms in normal load.
  error_rate_pct:
    objective: 2
    target: 99.0
    note: Error budget allows up to 2% failed requests; alerts should trigger before the burn rate is too high.
  daily_cost_usd:
    objective: 2.5
    target: 100.0
    note: Daily spend should stay under $2.5 in steady state; investigate spikes during incident simulations.
  quality_score_avg:
    objective: 0.75
    target: 95.0
    note: Maintain average heuristic quality score above 0.75 for at least 95% of the rolling window.
